<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Write-up — Degrees of Consequence</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Hanken+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />

  <style>
    .writeup-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 80px 6vw 80px;
      box-sizing: border-box;
    }
    .writeup-back {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-soft);
      text-decoration: none;
      border: 1px solid rgba(42,51,36,0.25);
      border-radius: 4px;
      padding: 5px 10px;
      display: inline-block;
      margin-bottom: 64px;
      transition: color 160ms ease, border-color 160ms ease;
    }
    .writeup-back:hover {
      color: var(--ink);
      border-color: rgba(42,51,36,0.6);
    }
    .writeup-page h1 {
      font-family: var(--serif);
      font-size: clamp(40px, 5.5vw, 82px);
      line-height: 1.0;
      letter-spacing: -0.02em;
      max-width: 20ch;
      margin-bottom: 24px;
    }
    .writeup-page .sub {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }
  </style>
</head>
<body>
  <div class="writeup-page">
    <a href="index.html" class="writeup-back">← Back to visualization</a>
    <div class="sub" style="margin-bottom: 20px">DSC 106 · Vol. 01 · 2026</div>
    <h1>Degrees of Consequence</h1>
    <div class="sub">Tanvi Vidyala · Nithya Nair · Viela Lansangam</div>
  </div>
</body>
</html>
